name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'python-sidecar/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'python-sidecar/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  build:
    if: github.event_name == 'push' && github.repository == 'rachmad-jenss/haul-calc'
    needs: lint
    runs-on: self-hosted
    timeout-minutes: 45
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        shell: cmd
        run: |
          if not exist "C:\Windows\ServiceProfiles\NetworkService\.cargo\bin\rustup.exe" (
            curl -sSf -o "%TEMP%\rustup-init.exe" https://win.rustup.rs/x86_64
            "%TEMP%\rustup-init.exe" -y --default-toolchain stable --no-modify-path
            del "%TEMP%\rustup-init.exe"
          )
          set PATH=C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;%PATH%
          rustup update stable --no-self-update
          rustup default stable

      - name: Build sidecar
        shell: cmd
        run: |
          set PATH=C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;%PATH%
          powershell.exe -ExecutionPolicy Bypass -File python-sidecar/build.ps1

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install chromium --with-deps

      - name: Run E2E smoke tests
        id: e2e
        run: pnpm test:e2e

      - name: Upload E2E artifacts on failure
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright-report/
            tests/test-results/
            tests/screenshots/

      - name: Unblock bundler tools
        shell: cmd
        run: |
          set TAURI_CACHE=C:\Windows\ServiceProfiles\NetworkService\AppData\Local\tauri
          if exist "%TAURI_CACHE%" (
            powershell.exe -ExecutionPolicy Bypass -Command "Get-ChildItem -Path 'C:\Windows\ServiceProfiles\NetworkService\AppData\Local\tauri' -Recurse -File | Unblock-File"
            echo Bundler tools unblocked
          ) else (
            echo No cached bundler tools found
          )

      - name: Build Tauri app
        shell: cmd
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set PATH=C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;%PATH%
          pnpm tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: haul-calc-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
