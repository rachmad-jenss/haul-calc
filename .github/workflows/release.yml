name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted
    timeout-minutes: 60
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        shell: cmd
        run: |
          if not exist "C:\Windows\ServiceProfiles\NetworkService\.cargo\bin\rustup.exe" (
            curl -sSf -o "%TEMP%\rustup-init.exe" https://win.rustup.rs/x86_64
            "%TEMP%\rustup-init.exe" -y --default-toolchain stable --no-modify-path
            del "%TEMP%\rustup-init.exe"
          )
          set PATH=C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;%PATH%
          rustup update stable --no-self-update
          rustup default stable

      - name: Build sidecar
        shell: cmd
        run: |
          set PATH=C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;%PATH%
          powershell.exe -ExecutionPolicy Bypass -File python-sidecar/build.ps1

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Unblock bundler tools
        shell: cmd
        run: |
          set TAURI_CACHE=C:\Windows\ServiceProfiles\NetworkService\AppData\Local\tauri
          if exist "%TAURI_CACHE%" (
            powershell.exe -ExecutionPolicy Bypass -Command "Get-ChildItem -Path 'C:\Windows\ServiceProfiles\NetworkService\AppData\Local\tauri' -Recurse -File | Unblock-File"
            echo Bundler tools unblocked
          ) else (
            echo No cached bundler tools found
          )

      - name: Build Tauri app and create GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PATH: C:\Windows\ServiceProfiles\NetworkService\.cargo\bin;${{ env.PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Haul Calc ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true

      - name: Upload updater artifacts and latest.json
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleDir = "src-tauri\target\release\bundle"
          $nsisDir   = "$bundleDir\nsis"
          $tag       = "${{ github.ref_name }}"
          $version   = $tag.TrimStart('v')
          $repo      = "${{ github.repository }}"

          # Find the .nsis.zip and its .sig
          $zipFile = Get-ChildItem "$nsisDir\*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sigFile = Get-ChildItem "$nsisDir\*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $zipFile) { Write-Host "No .nsis.zip found — skipping latest.json"; exit 0 }
          if (-not $sigFile) { Write-Host "No .nsis.zip.sig found — skipping latest.json"; exit 0 }

          $sig      = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipName  = $zipFile.Name
          $dlUrl    = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          # Upload .nsis.zip to the release
          Write-Host "Uploading $zipName to release $tag..."
          gh release upload $tag $zipFile.FullName --clobber

          # Build latest.json
          $json = @{
            version  = $version
            notes    = "See the assets to download and install this version."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url       = $dlUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $jsonPath = "$env:TEMP\latest.json"
          $json | Set-Content $jsonPath -Encoding UTF8
          Write-Host "latest.json content:`n$json"

          Write-Host "Uploading latest.json to release $tag..."
          gh release upload $tag $jsonPath --clobber
          Write-Host "Done."
